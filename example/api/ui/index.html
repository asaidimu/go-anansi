<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collection Browser</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
            <div class="h-16 flex items-center px-6 text-xl font-bold border-b border-gray-200">Collections</div>
            <ul id="collectionsList" class="flex-1 overflow-y-auto p-4 space-y-1 text-sm">
                <li class="text-gray-500">Loading collections...</li>
            </ul>
            <div class="px-4 pb-4">
                <button onclick="openSchemaEditor()"
                    class="w-full px-3 py-2 bg-blue-600 text-white rounded text-sm hover:bg-blue-700">
                    ➕ Add Collection
                </button>
            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 flex flex-col">
            <!-- Topbar -->
            <div class="h-16 flex justify-between items-center px-6 border-b border-gray-200 bg-white">
                <h1 id="contentTitle" class="text-lg font-medium">Select a collection</h1>
            </div>

            <!-- Tabs -->
            <div class="border-b border-gray-200 px-6">
                <nav class="flex gap-4" id="viewerTabs">
                    <button
                        class="tab active px-4 py-2 text-sm font-medium text-indigo-600 border-b-2 border-indigo-600"
                        onclick="switchTab('data')">Data</button>
                    <button class="tab px-4 py-2 text-sm font-medium text-gray-600 hover:text-indigo-600"
                        onclick="switchTab('schema')">Schema</button>
                </nav>
                <div class="p-4" id="queryContainer">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Query</label>
                    <input type="text" id="queryInput" placeholder='{"field": "value"}'
                        class="w-full px-3 py-2 border border-gray-300 rounded text-sm font-mono" />
                </div>
            </div>

            <!-- Viewer -->
            <div id="documentsContent" class="p-6 overflow-auto flex-1">
                <p class="text-center text-gray-400 py-20">Select a collection to view its documents</p>
            </div>
        </main>
    </div>

    <!-- Schema Editor Modal -->
    <div id="schemaModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden">
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-lg shadow-lg w-full max-w-2xl p-6">
            <h2 class="text-lg font-semibold mb-4">Create New Collection</h2>
            <label class="block mb-2 text-sm font-medium text-gray-700">Schema (JSON)</label>
            <textarea id="schemaInput" class="w-full h-64 p-3 border border-gray-300 rounded font-mono text-sm"
                placeholder='{
  "id": { "name": "id", "type": "string", "required": true, "unique": true },
  "username": { "name": "username", "type": "string", "required": true, "unique": true }
}'></textarea>
            <div class="flex justify-end gap-2 mt-4">
                <button onclick="closeSchemaEditor()"
                    class="px-3 py-1 bg-gray-500 text-white rounded hover:bg-gray-600">Cancel</button>
                <button onclick="submitSchema()"
                    class="px-3 py-1 bg-green-600 text-white rounded hover:bg-green-700">Create</button>
            </div>
        </div>
    </div>
    <script>


/**
 * @file A minimal JavaScript SDK for the Anansi API.
 * This SDK provides a simple class to interact with the API endpoints.
 * It handles the API response envelope and simplifies making requests.
 */

/**
 * Class representing a client for the API.
 * This client provides methods for all major data and schema operations.
 */
class APIClient {
  /**
   * Constructs the APIClient.
   * @param {string} baseURL - The base URL of the API, e.g., 'http://localhost:8080'.
   */
  constructor(baseURL) {
    /** @private */
    this.baseURL = baseURL;
  }

  /**
   * Internal method to handle all API requests, including error handling.
   * @private
   * @param {string} endpoint - The API endpoint path.
   * @param {object} [body={}] - The request body payload.
   * @returns {Promise<object>} The data from a successful API response.
   * @throws {Error} Throws an error if the API request fails or returns an error envelope.
   */
  async _request(endpoint, body = {}) {
    const url = `${this.baseURL}${endpoint}`;

    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(body),
      });

      // Check for network or HTTP errors first
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }

      const apiResponse = await response.json();

      // Check the API's success envelope
      if (!apiResponse.success) {
        const error = apiResponse.error || {};
        const errorMessage = `API Error: ${error.message || 'Unknown error'}`;
        const errorDetails = error.details ? ` (${error.details})` : '';
        throw new Error(`${errorMessage}${errorDetails}`);
      }

      // Return the data part of the envelope
      return apiResponse.data;

    } catch (error) {
      console.error('Failed to make API request:', error);
      throw error;
    }
  }

  // --- Collection Data Operations ---

  /**
   * Creates one or more documents in a specified collection.
   * @param {string} collection - The name of the collection.
   * @param {Array<object>} documents - An array of document objects to create.
   * @returns {Promise<Array<object>>} The created documents.
   */
  async createDocuments(collection, documents) {
    const endpoint = `/api/collections/${collection}/create`;
    return this._request(endpoint, { documents });
  }

  /**
   * Reads documents from a specified collection.
   * @param {string} collection - The name of the collection.
   * @param {object} [query={}] - An optional query object to filter documents.
   * @returns {Promise<object>} The result of the read operation.
   */
  async readDocuments(collection, query = {}) {
    const endpoint = `/api/collections/${collection}/read`;
    return this._request(endpoint, { query });
  }

  /**
   * Updates documents in a specified collection.
   * @param {string} collection - The name of the collection.
   * @param {object} data - The document data containing fields to update.
   * @param {object} filter - A query filter to select documents to update.
   * @param {number} [version] - The document version for optimistic locking.
   * @returns {Promise<object>} An object with the `updatedCount`.
   */
  async updateDocuments(collection, data, filter, version) {
    const endpoint = `/api/collections/${collection}/update`;
    return this._request(endpoint, { data, filter, version });
  }

  /**
   * Deletes documents from a specified collection.
   * @param {string} collection - The name of the collection.
   * @param {object} filter - A query filter to select documents to delete.
   * @param {boolean} [unsafe=false] - Whether to perform an unsafe deletion.
   * @returns {Promise<object>} An object with the `deletedCount`.
   */
  async deleteDocuments(collection, filter, unsafe = false) {
    const endpoint = `/api/collections/${collection}/delete`;
    return this._request(endpoint, { filter, unsafe });
  }

  /**
   * Validates a document against its schema in a specified collection.
   * @param {string} collection - The name of the collection.
   * @param {object} data - The document data to validate.
   * @param {boolean} [loose=false] - Whether to perform loose validation.
   * @returns {Promise<object>} The validation result.
   */
  async validateDocument(collection, data, loose = false) {
    const endpoint = `/api/collections/${collection}/validate`;
    return this._request(endpoint, { data, loose });
  }

  // --- Collection Management Operations ---

  /**
   * Gets a list of all collections.
   * @returns {Promise<object>} An object containing an array of collection names.
   */
  async listCollections() {
    const endpoint = `/api/collections/list`;
    return this._request(endpoint);
  }

  /**
   * Creates a new collection with a given schema.
   * @param {object} schema - The schema definition for the new collection.
   * @returns {Promise<object>} An object confirming the creation.
   */
  async createCollection(schema) {
    const endpoint = `/api/collections/create`;
    return this._request(endpoint, { schema });
  }

  /**
   * Gets the schema of a specified collection.
   * @param {string} name - The name of the collection.
   * @param {string} [version] - The version of the schema to retrieve.
   * @returns {Promise<object>} The schema definition.
   */
  async getCollectionSchema(name, version) {
    const endpoint = `/api/collections/schema`;
    return this._request(endpoint, { name, version });
  }

  /**
   * Deletes a specified collection.
   * @param {string} name - The name of the collection to delete.
   * @returns {Promise<object>} An object confirming the deletion.
   */
  async deleteCollection(name) {
    const endpoint = `/api/collections/delete`;
    return this._request(endpoint, { name });
  }

  // --- Transaction Operations ---

  /**
   * Executes a series of operations in a single transaction.
   * @param {Array<object>} operations - An array of operation objects.
   * @returns {Promise<object>} An object with the results of each operation.
   */
  async executeTransaction(operations) {
    const endpoint = `/api/transactions/execute`;
    return this._request(endpoint, { operations });
  }

  // --- Schema Operations ---

  /**
   * Migrates a collection's schema.
   * @param {string} name - The name of the collection.
   * @param {object} migration - The migration object.
   * @param {boolean} [dryRun=false] - Whether to perform a dry run.
   * @returns {Promise<object>} An object confirming the migration.
   */
  async migrateSchema(name, migration, dryRun = false) {
    const endpoint = `/api/schema/migrate`;
    return this._request(endpoint, { name, migration, dryRun });
  }

  /**
   * Rolls back a collection's schema to a previous version.
   * @param {string} name - The name of the collection.
   * @param {string} [version] - The version to rollback to.
   * @param {boolean} [dryRun=false] - Whether to perform a dry run.
   * @returns {Promise<object>} An object confirming the rollback.
   */
  async rollbackSchema(name, version, dryRun = false) {
    const endpoint = `/api/schema/rollback`;
    return this._request(endpoint, { name, version, dryRun });
  }
}

let currentCollection = null;
let currentDocuments = [];
let schemaMap = {};
const client = new APIClient("http://localhost:8081");

let activeTab = 'data';

window.addEventListener("DOMContentLoaded", () => {
  loadCollections();
});

async function loadCollections() {
  const ul = document.getElementById("collectionsList");
  ul.innerHTML = "<li class='text-gray-500'>Loading collections...</li>";
  try {
    const res = await client.listCollections();
    const collections = res.collections || [];
    if (collections.length === 0)
      return (ul.innerHTML = "<li class='text-gray-400'>No collections</li>");

    ul.innerHTML = "";
    collections.forEach((col, idx) => {
      const li = document.createElement("li");
      li.textContent = col;
      li.className = "px-3 py-2 rounded cursor-pointer hover:bg-gray-100";
      li.onclick = () => selectCollection(col);
      ul.appendChild(li);
      if (idx === 0) selectCollection(col); // auto select first
    });

  } catch (err) {
    ul.innerHTML = `<li class=\"text-red-500\">${err.message}</li>`;
  }
}

window.selectCollection = async function (name) {
  currentCollection = name;
  document.querySelectorAll("#collectionsList li").forEach(li => {
    li.classList.remove("bg-gray-200", "font-semibold");
    if (li.textContent === name) li.classList.add("bg-gray-200", "font-semibold");
  });
  document.getElementById("contentTitle").textContent = name;
  await loadSchema();
  await loadDocuments();
};

async function loadSchema() {
  const data = await client.getCollectionSchema(currentCollection);
  schemaMap = data.fields || {};
  if (activeTab === 'schema') renderSchemaView();
}

async function loadDocuments() {
  let query = {};
  try {
    const input = document.getElementById("queryInput");
    if (input && input.value) query = JSON.parse(input.value);
  } catch (_) {}
  const res = await client.readDocuments(currentCollection,query);
  const docs = res.count === 1 ? [res.data] : res.data;
  currentDocuments = docs;
  if (activeTab === 'data') renderTable(docs);
}

function renderTable(documents) {
  const fields = Object.values(schemaMap)
    .filter(f => f.name && f.type && f.name !== '_metadata_')
    .map(f => f.name);
  const container = document.getElementById('documentsContent');
  if (!documents.length || !fields.length) {
    container.innerHTML = '<p class="text-center text-gray-400 py-20">No documents found</p>';
    return;
  }

  const table = document.createElement('table');
  table.className = 'min-w-full text-sm border border-gray-200';
  const thead = document.createElement('thead');
  thead.innerHTML = `<tr class="bg-gray-100">
    ${fields.map(f => `<th class="px-4 py-2 text-left border-b border-gray-200">${f}</th>`).join('')}
    <th class="px-4 py-2 border-b border-gray-200">Actions</th>
  </tr>`;

  const tbody = document.createElement('tbody');
  documents.forEach((doc, i) => {
    const row = document.createElement('tr');
    row.className = i % 2 === 0 ? 'bg-white' : 'bg-gray-50';
    row.innerHTML = fields.map(f => `<td class="px-4 py-2 border-b border-gray-100 font-mono">${JSON.stringify(doc[f] ?? '')}</td>`).join('');
    row.innerHTML += `<td class="px-4 py-2 border-b border-gray-100">
      <button class="text-blue-600 hover:underline" onclick="alert('Edit not implemented')">Edit</button>
      <button class="text-red-600 hover:underline ml-2" onclick="alert('Delete not implemented')">Delete</button>
    </td>`;
    tbody.appendChild(row);
  });
  table.append(thead, tbody);
  container.innerHTML = '';
  container.appendChild(table);
}

function renderSchemaView() {
  const container = document.getElementById('documentsContent');
  const fields = Object.values(schemaMap).filter(f => f.name && f.type);
  if (!fields.length) {
    container.innerHTML = '<p class="text-center text-gray-400 py-20">No schema fields</p>';
    return;
  }
  const rows = fields.map(f => `<tr>
    <td class="border px-4 py-2 font-mono">${f.name}</td>
    <td class="border px-4 py-2">${f.type}</td>
    <td class="border px-4 py-2">${f.required ? '✅' : ''}</td>
    <td class="border px-4 py-2">${f.unique ? '🔒' : ''}</td>
  </tr>`).join('');
  container.innerHTML = `
    <table class="table-auto border-collapse border border-gray-200 w-full text-sm">
      <thead class="bg-gray-100">
        <tr>
          <th class="border px-4 py-2 text-left">Field</th>
          <th class="border px-4 py-2 text-left">Type</th>
          <th class="border px-4 py-2 text-left">Required</th>
          <th class="border px-4 py-2 text-left">Unique</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

window.switchTab = function (tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.remove('text-indigo-600', 'border-indigo-600', 'border-b-2');
    t.classList.add('text-gray-600');
  });
  event.target.classList.remove('text-gray-600');
  event.target.classList.add('text-indigo-600', 'border-indigo-600', 'border-b-2');
  document.getElementById("queryContainer").style.display = tab === 'data' ? 'block' : 'none';
  if (tab === 'data') renderTable(currentDocuments);
  else renderSchemaView();
};

window.openSchemaEditor = function () {
  document.getElementById("schemaModal").classList.remove("hidden");
};

window.closeSchemaEditor = function () {
  document.getElementById("schemaModal").classList.add("hidden");
};

window.submitSchema = async function () {
  const text = document.getElementById("schemaInput").value.trim();
  if (!text) return;
  try {
    const parsed = JSON.parse(text);
    await client.createCollection(parsed);
    closeSchemaEditor();
    loadCollections();
  } catch (err) {
    alert("Failed to create collection: " + err.message);
  }
};

    </script>
</body>

</html>
